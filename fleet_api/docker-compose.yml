version: "3.9"

services:
  db:
    image: postgres:16
    container_name: fleet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleet_telemetry
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_pass_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fleet_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fleet_user:fleet_pass_dev_only@db:5432/fleet_telemetry
    ports:
      - "8000:8000"
    volumes:
      - ./model_output:/app/model_output:ro

volumes:
  postgres_data:
